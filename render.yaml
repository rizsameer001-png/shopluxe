services:
  # Backend API
  - type: web
    name: shoplux-api
    env: node
    rootDir: apps/server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # ⚠️ Set your cloud MongoDB URI in Render dashboard
      - key: JWT_SECRET
        sync: false   # ⚠️ Set your JWT secret in Render dashboard

  # Storefront (Next.js)
  - type: web
    name: shoplux-web
    env: node
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://shoplux-api.onrender.com/api

  # Admin panel (Vite, production-ready)
  - type: web
    name: shoplux-admin
    env: node
    rootDir: apps/admin
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://shoplux-api.onrender.com/api